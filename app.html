<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>C.L.O.E. COACH</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0c1018;--surface:#151b28;--surface2:#1c2433;--border:#2b3448;--accent:#c8f135;--accent2:#5b9cf6;--accent3:#f1a135;--accent4:#a78bfa;--text:#eef4ff;--muted:#9aa7bd;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Syne,sans-serif;min-height:100vh}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{background:#101622;padding:20px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{font-size:22px;font-weight:800;margin-bottom:1px}.brand span{color:var(--accent)}
.tagline{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:1px;margin-bottom:10px}
.user-info{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 11px;margin-bottom:10px}
.user-name{font-size:12px;font-weight:700;margin-bottom:1px}
.user-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.ns{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:7px 0 3px}
.nav button{display:flex;align-items:center;gap:7px;width:100%;background:transparent;color:var(--muted);border:none;padding:7px 9px;border-radius:9px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;text-align:left;transition:all .15s}
.nav button:hover{background:var(--surface2);color:var(--text)}
.nav button.on{background:var(--surface2);color:var(--accent);border-left:2px solid var(--accent)}
.nav button .ic{font-size:12px;width:15px;text-align:center}
.week-pill{font-family:'DM Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);padding:7px 10px;border-radius:10px;color:var(--muted);margin-top:auto}
.week-pill span{color:var(--accent);font-weight:500}
.mob-btn-sb{width:100%;background:linear-gradient(135deg,var(--accent),#9ec900);color:#111;border:none;padding:9px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:12px;cursor:pointer;margin-top:8px}

.main{padding:22px;overflow-y:auto}
.ph{margin-bottom:16px}.ph h1{font-size:20px;font-weight:800}
.ph p{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:3px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-bottom:16px}
.card{background:var(--surface);padding:13px;border-radius:13px;border:1px solid var(--border)}
.cl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.cv{font-size:24px;font-weight:800;font-family:'DM Mono',monospace}
.cv.a{color:var(--accent)}.cv.b{color:var(--accent2)}.cv.o{color:var(--accent3)}.cv.p{color:var(--accent4)}
.cs{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px}
.stitle{font-size:12px;font-weight:800;margin:16px 0 8px;display:flex;align-items:center;gap:7px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.day-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:11px}
.day-tab{font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.day-tab.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:500}

/* INTERVALS FORMAT BLOCKS */
.intervals-block{background:#070e1c;border-radius:11px;border:1px solid var(--border);padding:14px;margin-bottom:9px;position:relative}
.intervals-block pre{white-space:pre-wrap;color:var(--accent);line-height:2;font-size:12px;font-family:'DM Mono',monospace}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 9px;border-radius:6px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer}
.copy-btn:hover{color:var(--accent);border-color:var(--accent)}
.session-goal{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:8px 10px;background:var(--surface2);border-radius:8px;margin-top:8px;line-height:1.7;border-left:2px solid var(--accent2)}

/* SUPPLEMENT BLOCK */
.supp-block{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:11px}
.supp-header{background:var(--surface2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.supp-title{font-size:12px;font-weight:800}
.supp-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent4);border:1px solid var(--accent4);padding:2px 8px;border-radius:5px}
.supp-body{padding:13px}
.supp-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(43,52,72,.35)}
.supp-row:last-child{border-bottom:none}
.supp-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.supp-name{font-size:12px;font-weight:700;flex:1}
.supp-dose{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent3)}
.supp-timing{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px}

/* NUTRITION WITH OPTIONS */
.meal-option-tabs{display:flex;gap:5px;margin-bottom:8px}
.meal-opt-btn{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.meal-opt-btn.sel{background:rgba(200,241,53,.12);border-color:var(--accent);color:var(--accent)}
.meal-option{display:none}.meal-option.active{display:block}
.meal-block{background:var(--surface2);border-radius:11px;padding:12px;border:1px solid var(--border);margin-bottom:9px}
.meal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.meal-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.meal-kcal{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.meal-macros{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2);margin-top:1px}
.food-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(43,52,72,.35)}
.food-row:last-child{border-bottom:none}
.food-name{font-size:11px}.food-amount{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.food-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent3);margin-top:2px}
.meal-note{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);padding:6px 8px;background:var(--bg);border-radius:7px;border-left:2px solid var(--accent3);line-height:1.7;margin-top:5px}
.macro-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.macro-item{text-align:center;background:var(--surface2);padding:8px;border-radius:9px}
.macro-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--accent)}
.macro-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);margin-top:1px;text-transform:uppercase}
.meal-day-tabs{display:flex;gap:4px;margin-bottom:11px;flex-wrap:wrap}
.meal-day-tab{font-family:'DM Mono',monospace;font-size:9px;padding:4px 9px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer}
.meal-day-tab.active{color:var(--accent);border-color:var(--accent)}

.plan-viewer{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:11px}
.plan-viewer-hdr{background:var(--surface2);padding:10px 13px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.plan-viewer-title{font-size:12px;font-weight:800}
.plan-viewer-body{padding:14px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.9;color:var(--text);white-space:pre-wrap;max-height:65vh;overflow-y:auto}
.plan-viewer-body.empty{color:var(--muted)}
.chk{display:flex;align-items:center;gap:10px;padding:8px;background:var(--surface2);border-radius:9px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);transition:all .15s}
.chk.done{border-color:var(--accent);background:rgba(200,241,53,.04)}
.chkbox{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.chk.done .chkbox{background:var(--accent);border-color:var(--accent);color:#111}
.chkt{font-size:11px;font-weight:700}.chks{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px}
.report-area{width:100%;background:#070e1c;color:var(--accent);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.9;min-height:260px;resize:vertical;outline:none}
.alert{background:rgba(200,241,53,.07);border:1px solid rgba(200,241,53,.25);border-radius:9px;padding:9px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-bottom:10px;line-height:1.6}
.btn{background:var(--accent);color:#111;border:none;padding:8px 15px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:11px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
input,textarea,label{font-family:'DM Mono',monospace}
input,textarea{width:100%;background:#0f1624;color:var(--text);border:1px solid var(--border);padding:7px 10px;border-radius:9px;font-size:11px;outline:none;transition:border .15s}
input:focus,textarea:focus{border-color:var(--accent2)}
label{font-size:9px;color:var(--muted);display:block;margin-top:8px;margin-bottom:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.plan-row{display:grid;grid-template-columns:90px 100px 1fr;gap:8px;align-items:center;padding:7px 10px;background:var(--surface2);border-radius:9px;font-family:'DM Mono',monospace;font-size:10px;margin-bottom:5px}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Mono',monospace;color:var(--muted);font-size:13px}

/* ── MOBILE OVERLAY ── */
.mob-overlay{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;background:var(--bg)}
.mob-overlay.open{display:flex}
.mob-topbar{background:#101622;border-bottom:1px solid var(--border);padding:11px 15px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mob-brand{font-size:17px;font-weight:800}.mob-brand span{color:var(--accent)}
.mob-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center}
.mob-day-bar{background:#101622;border-bottom:1px solid var(--border);padding:9px 12px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.mob-day-btn{font-family:'DM Mono',monospace;font-size:10px;padding:5px 9px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.mob-day-btn.on{background:var(--accent);color:#111;border-color:var(--accent);font-weight:500}
.mob-body{flex:1;overflow-y:auto;padding:13px 13px 80px;-webkit-overflow-scrolling:touch}
.mob-section{margin-bottom:16px}
.mob-section-title{font-size:12px;font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.mob-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* MOBILE INTERVALS FORMAT */
.mob-intervals{background:#070e1c;border-radius:11px;border:1px solid var(--border);padding:12px;margin-bottom:8px;position:relative}
.mob-intervals pre{white-space:pre-wrap;color:var(--accent);line-height:2;font-size:11px;font-family:'DM Mono',monospace}
.mob-copy{position:absolute;top:6px;right:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer}
/* MOBILE SUPPLEMENT */
.mob-supp-row{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--surface);border-radius:10px;margin-bottom:6px;border:1px solid var(--border)}
.mob-supp-done{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:pointer;transition:all .15s}
.mob-supp-done.ok{background:var(--accent4);border-color:var(--accent4);color:#fff}
/* MOBILE EXERCISE */
.mob-ex{background:var(--surface);border-radius:11px;border:1px solid var(--border);padding:11px;margin-bottom:7px}
.mob-ex-name{font-size:13px;font-weight:800;margin-bottom:2px}
.mob-ex-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:9px}
.mob-ex-rir{display:inline-block;font-family:'DM Mono',monospace;font-size:8px;color:var(--accent3);background:rgba(241,161,53,.1);padding:2px 6px;border-radius:4px;margin-left:5px}
.mob-sets{display:grid;gap:5px}
.mob-set-row{display:grid;grid-template-columns:22px 1fr 1fr 1fr 26px;gap:5px;align-items:center}
.mob-set-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center}
.mob-set-input{background:#0f1624;color:var(--text);border:1px solid var(--border);padding:7px 5px;border-radius:7px;font-family:'DM Mono',monospace;font-size:12px;outline:none;text-align:center;width:100%}
.mob-set-input:focus{border-color:var(--accent2)}
.mob-set-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-align:center}
.mob-set-done{width:26px;height:26px;border-radius:6px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.mob-set-done.ok{background:var(--accent);border-color:var(--accent);color:#111}
.mob-prog-hint{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2);margin-top:5px}
/* MOBILE MEAL */
.mob-meal{background:var(--surface);border-radius:11px;border:1px solid var(--border);margin-bottom:7px;overflow:hidden}
.mob-meal-hdr{background:var(--surface2);padding:9px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.mob-meal-left{flex:1}
.mob-meal-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.mob-meal-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:1px}
.mob-meal-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:pointer;transition:all .15s}
.mob-meal-check.done{background:var(--accent);border-color:var(--accent);color:#111}
.mob-meal-body{display:none;padding:10px 12px;border-top:1px solid var(--border)}
.mob-meal-body.open{display:block}
/* meal option tabs mobile */
.mob-opt-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.mob-opt-btn{font-family:'DM Mono',monospace;font-size:9px;padding:3px 9px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer}
.mob-opt-btn.sel{background:rgba(200,241,53,.12);border-color:var(--accent);color:var(--accent)}
.mob-food-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(43,52,72,.3);font-size:11px}
.mob-food-row:last-child{border-bottom:none}
.mob-food-amt{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.mob-mark-btn{width:100%;margin-top:9px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:8px;border-radius:8px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s}
.mob-mark-btn.done{background:rgba(200,241,53,.1);color:var(--accent);border-color:var(--accent)}
/* MOBILE REST */
.mob-rest-card{background:var(--surface);border-radius:11px;border:1px solid var(--border);padding:18px;text-align:center}
.mob-rest-icon{font-size:32px;margin-bottom:8px}
/* MOBILE OBS */
.mob-obs-ta{background:#0f1624;color:var(--text);border:1px solid var(--border);padding:9px;border-radius:9px;font-family:'DM Mono',monospace;font-size:12px;width:100%;outline:none;min-height:80px;resize:none;line-height:1.7}
.mob-obs-ta:focus{border-color:var(--accent2)}
/* MOBILE SAVE BAR */
.mob-save-bar{position:fixed;bottom:0;left:0;right:0;background:#101622;border-top:1px solid var(--border);padding:9px 13px;display:flex;gap:8px;align-items:center;z-index:1001}
.mob-save-btn{flex:1;background:var(--accent);color:#111;border:none;padding:10px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:12px;cursor:pointer}
.mob-status{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);min-width:80px}
.mob-status span{color:var(--accent);font-weight:500}
@media(max-width:860px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto}}
/* ── MI PLAN ── */
.myplan-tabs{display:flex;gap:5px;margin-bottom:13px;flex-wrap:wrap}
.myplan-tab{font-family:'DM Mono',monospace;font-size:10px;padding:5px 11px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.myplan-tab.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:500}
.myplan-pane{display:none}.myplan-pane.on{display:block}
.plan-hdr{background:linear-gradient(135deg,rgba(200,241,53,.07),rgba(91,156,246,.04));border:1px solid rgba(200,241,53,.22);border-radius:14px;padding:16px;margin-bottom:14px}
.plan-hdr-title{font-size:14px;font-weight:800;margin-bottom:2px}.plan-hdr-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:1px;margin-bottom:11px}
.plan-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.plan-macro{text-align:center;background:rgba(0,0,0,.25);padding:9px 4px;border-radius:9px}
.plan-macro-v{font-family:'DM Mono',monospace;font-size:16px;font-weight:500;margin-bottom:2px}
.plan-macro-l{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.plan-blk{background:var(--surface);border:1px solid var(--border);border-radius:11px;margin-bottom:8px;overflow:hidden}
.plan-blk-hdr{background:var(--surface2);padding:9px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.plan-blk-title{font-size:11px;font-weight:800}
.plan-blk-body{display:none;padding:12px 13px}.plan-blk-body.on{display:block}
.plan-intervals{background:#070e1c;border-radius:9px;border:1px solid var(--border);padding:12px;margin:4px 0;position:relative}
.plan-intervals pre{white-space:pre-wrap;color:var(--accent);line-height:2;font-size:11px;font-family:'DM Mono',monospace}
.plan-cpbtn{position:absolute;top:7px;right:7px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:2px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer}.plan-cpbtn:hover{color:var(--accent);border-color:var(--accent)}
.plan-txt{font-family:'DM Mono',monospace;font-size:10px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.plan-toma{background:var(--surface);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;overflow:hidden}
.plan-toma-hdr{background:var(--surface2);padding:9px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.plan-toma-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.plan-toma-body{display:none;padding:11px 13px}.plan-toma-body.on{display:block}
.plan-obj-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(43,52,72,.35);font-family:'DM Mono',monospace;font-size:10px}
.plan-obj-row:last-child{border-bottom:none}
.plan-sig{padding:6px 10px;margin:3px 0;border-radius:7px;font-family:'DM Mono',monospace;font-size:10px;line-height:1.7}
.plan-sig-g{background:rgba(200,241,53,.07);border-left:3px solid var(--accent);color:var(--accent)}
.plan-sig-w{background:rgba(241,161,53,.07);border-left:3px solid var(--accent3);color:var(--accent3)}

function todayPlanIdx(){ const d=new Date().getDay(); return d===0?6:d-1; }
function localDateOnly(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }
function parseLocalDate(s){
  if(!s) return null;
  const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return null;
  return new Date(+m[1],+m[2]-1,+m[3]);
}
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function diffDays(a,b){ return Math.floor((localDateOnly(a)-localDateOnly(b))/86400000); }
function mondayOf(d){ const x=localDateOnly(d); x.setDate(x.getDate()-((x.getDay()+6)%7)); return x; }
function fmtShortDate(d){ return d.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'}); }

function getTimelineInfo(){
  const start=getPlanStartDate();

    return {start:null,today,q:getQuincena(w),week:w,dayOffset:((w-1)%2)*7+todayPlanIdx(),beforeStart:false,qStart:null};
  }
  const offset=diffDays(today,start);
  const beforeStart=offset<0;
  const q=beforeStart?1:Math.min(TOTAL_QUINCENAS,Math.floor(offset/14)+1);
  const week=beforeStart?1:Math.min(TOTAL_QUINCENAS*2,Math.floor(offset/7)+1);
  const dayOffset=beforeStart?offset:offset%14;
  const qStart=beforeStart?start:addDays(start,(q-1)*14);
  return {start,today,q,week,dayOffset,beforeStart,qStart};
}

// ── PLAN RUNTIME PARSERS ──────────────────────────────────
function getPlanText(){ return profile?.current_plan||profile?.quincena1_plan||''; }
function splitPlanBlocks(text, titleRx){
  if(!text) return [];
  const blocks=[];let m;
  const box='(?:[─━═\\-]{5,})';
  const rx=new RegExp(box+'\\s*\\n([^\\n─━═-]+)\\n'+box+'\\s*\\n([\\s\\S]*?)(?='+box+'|$)','gi');
  while((m=rx.exec(text))!==null){
    const title=m[1].trim();
    const content=m[2].trim();
    if(!titleRx||titleRx.test(title)) blocks.push({title,content});
  }
  if(blocks.length) return blocks;
  const lines=text.split('\n');
  let cur=null;
  lines.forEach(line=>{
    const t=line.trim();
    if(titleRx&&titleRx.test(t)){
      if(cur) blocks.push(cur);
      cur={title:t,content:''};
    }else if(cur){
      cur.content+=(cur.content?'\n':'')+line;
    }
  });
  if(cur) blocks.push({title:cur.title,content:cur.content.trim()});
  return blocks.filter(b=>b.content);
}
function parseMacrosLine(line){
  if(!line) return null;
  const m=line.match(/(\d+)\s*kcal[\s\S]*?(\d+)\s*g?\s*P[\s\S]*?(\d+)\s*g?\s*HC[\s\S]*?(\d+)\s*g?\s*G/i);
  return m?{kcal:+m[1],protein:+m[2],carbs:+m[3],fat:+m[4]}:null;
}
function extractPlanNutritionData(text, fallbackMacros){
  if(!text) return null;
  const meals=splitPlanBlocks(text,/TOMA/i).map((b,i)=>{
    const name=b.title.replace(/^TOMA\s*\d+\s*[-–—:]?\s*/i,'').trim()||b.title;
    const kcal=(b.content.match(/\((\d+)\s*(?:kcal|cal|calor)/i)||[])[1];
    const macros=parseMacrosLine(b.content);
    return {key:'plan_meal_'+i,name,timing:b.title,kcal:kcal?+kcal:null,macros,content:b.content};
  });
  if(!meals.length) return null;
  const training=parseMacrosLine((text.match(/MACROS\s+D[IÍ]A\s+ENTRENO[^\n]+/i)||[])[0])||fallbackMacros;
  const rest=parseMacrosLine((text.match(/MACROS\s+D[IÍ]A\s+DESCANSO[^\n]+/i)||[])[0])||training;
  return {training,rest,meals};
}
function extractPlanSupplementsData(text){
  if(!text) return null;
  const blocks=splitPlanBlocks(text,null);
  if(blocks.length) return blocks.map((b,i)=>({key:'plan_supp_'+i,title:b.title,items:b.content.split('\n').map(x=>x.trim()).filter(Boolean)}));
  const lines=text.split('\n').map(x=>x.trim()).filter(Boolean);
  return lines.length?[{key:'plan_supps',title:'Suplementos personalizados',items:lines}]:null;
}
function applyPlanData(planText){
  if(!planText||!profile) return;
  const structured=parsePlanStructured(planText);
  profile._planStructured=structured;
  if(structured.macros){
    profile.kcal=+structured.macros.kcal||profile.kcal;
    profile.protein=+structured.macros.p||profile.protein;
    profile.carbs=+structured.macros.hc||profile.carbs;
    profile.fat=+structured.macros.g||profile.fat;
  }
  const fallback={kcal:profile.kcal||2475,protein:profile.protein||154,carbs:profile.carbs||310,fat:profile.fat||69};
  profile._planNutrition=extractPlanNutritionData(structured.C||'',fallback);
  profile._planSupplements=extractPlanSupplementsData(structured.A||'');
}
function getPlanStrengthForDay(dayIdx){
  const days=profile?._strengthDays||[];
  if(!days.length) return null;
  const label=(DAYLABELS[dayIdx]||'').toUpperCase();
  const byKey=days.find(d=>label.includes(d.key));
  if(byKey) return byKey;
  const strengthBefore=DAYTYPES.slice(0,dayIdx+1).filter(t=>t==='strength').length-1;
  return days[Math.max(0,Math.min(strengthBefore,days.length-1))]||days[0];
}
function getPlanRunningSessionForDay(dayIdx){
  let sessions=null;
  try{
    const pr=typeof profile?.plan_running==='string'?JSON.parse(profile.plan_running):profile?.plan_running;
    if(pr&&typeof pr==='object'&&Object.keys(pr).length>0) sessions=pr;
  }catch(e){}
  if(!sessions) return null;
  const label=(DAYLABELS[dayIdx]||'').toUpperCase();
  const key=label.match(/INTERVAL/i)?'intervals':label.match(/TEMPO/i)?'tempo':label.match(/TIRADA|LARGA/i)?'long':label.match(/CARDIO|SUAVE|RODAJE/i)?'cardio':null;
  const found=key&&sessions[key]?key:Object.keys(sessions)[0];
  const names={intervals:'INTERVALOS',tempo:'TEMPO',long:'TIRADA LARGA',cardio:'CARDIO'};
  return found?{label:names[found]||found.toUpperCase(),fmt:sessions[found],goal:'Plan personalizado de MI PLAN'}:null;
}
function parsePlanSchedule(text){
  if(!text) return null;
  const dm={'lunes':0,'martes':1,'miércoles':2,'miercoles':2,'jueves':3,'viernes':4,'sábado':5,'sabado':5,'domingo':6};
  const sched=Array(7).fill(null);let found=0;
  text.split('\n').forEach(line=>{
    const m=line.match(/^\s*([A-Za-záéíóúñÁÉÍÓÚÑ]+):\s+(\S[^\n]*)/);
    if(!m) return;
    const k=m[1].toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    const idx=dm[k];if(idx===undefined) return;
    const val=m[2].trim();
    const type=val.match(/^DESCANSO/i)?'rest':val.match(/FUERZA|GYM/i)?'strength':val.match(/RUNNING|CARDIO|ANDAR/i)?'running':null;
    if(type){sched[idx]={label:val.split(/[·—]/)[0].trim().toUpperCase(),type};found++;}
  });
  return found>=5?sched:null;
}
function parsePlanPaces(text){
  if(!text) return null;
  const easyM=text.match(/Easy[^:\n]*:\s*([\d]{1,2}:[\d]{2})\/km/i)||text.match(/conversacional[^:\n]*:\s*([\d]{1,2}:[\d]{2})\/km/i);
  const tempoM=text.match(/Rodaje suave[^:\n]*:\s*([\d]{1,2}:[\d]{2})\/km/i);
  if(!easyM) return null;
  return{easy:easyM[1],tempo:tempoM?tempoM[1]:null,interval:null};
}
function extractPlanRunningSessions(text){
  if(!text) return {};
  const sessions={};const seen=new Set();
  const rx=/─{5,}\s*\n([^\n─]+)\n─{5,}\s*\n([\s\S]*?)(?=─{5,}|$)/gi;
  let m;
  while((m=rx.exec(text))!==null){
    const title=m[1].trim().toUpperCase();const content=m[2].trim();
    if(title.match(/FUERZA|DESCANSO/i)||title.match(/SEMANA\s+\d/i)) continue;
    if(!content.match(/Warmup|Main set|Pace|\/km|\d+m\s+\d+:\d+/i)) continue;
    const key=title.match(/INTERVAL/i)?'intervals':title.match(/TEMPO/i)?'tempo':title.match(/TIRADA|LARGA/i)?'long':'cardio';
    if(!seen.has(key)){seen.add(key);sessions[key]=content;}
  }
  return sessions;
}
function extractPlanStrengthDays(text){
  if(!text) return [];
  const days=[];const seenKeys=new Set();
  const rx=/─{5,}\s*\n([^\n─]*FUERZA[^\n─]*)\n─{5,}\s*\n([\s\S]*?)(?=─{5,}|$)/gi;
  let m;
  while((m=rx.exec(text))!==null){
    const title=m[1].trim();const content=m[2].trim();
    const km=title.match(/FUERZA\s+([ABCD])\b/i);
    const key=km?km[1].toUpperCase():'D'+(days.length+1);
    if(seenKeys.has(key)) continue;
    seenKeys.add(key);
    days.push({title,content,key});
  }
  return days;
}

  document.querySelectorAll('.nav button')[map[v]]?.classList.add('on');

}
function renderView(){
  const timeline=getTimelineInfo();
  const w=timeline.week||profile?.week||1;
  const q=timeline.q||getQuincena(w);
  switch(currentView){
    case 'dashboard':    return renderDashboard(q,w);
    case 'training':     return renderTraining(q);
    case 'running':      return renderRunning(q);
    case 'supplements':  return renderSupplements(q);
    case 'nutrition':    return renderNutrition(q);
    case 'plan':         return renderPlan(q);
    case 'myplan':       return renderMyPlan(q);
    case 'report':       return renderReport(q);

  }
  return '';
}

    const rs=getPlanRunningSessionForDay(di)||getRunSession(wd,q);

  // ─ NUTRICIÓN ─

  html+=`<div class="stitle" style="margin:14px 0 9px">🥗 Nutrición · opciones disponibles</div>

  html+=nutr.meals.map(meal=>{

        ${meal.options.map((o,i)=>`<button class="cal-meal-opt" type="button">${String.fromCharCode(65+i)}</button>`).join('')}

function selectMealOpt(btn,mealKey,idx){
  btn.closest('.meal-option-tabs').querySelectorAll('.meal-opt-btn').forEach(b=>b.classList.remove('sel'));

  parent.querySelectorAll('.meal-option').forEach((el,i)=>el.classList.toggle('active',i===idx));

// ── MI PLAN PARSER & RENDERERS ───────────────────────────
let _blkId=0;
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function parsePlanStructured(text){
  if(!text) return {};
  const macroM=text.match(/Macros:[^\n]+/i);
  const macros=parseMacrosLine(macroM?macroM[0]:'');
  const faseM=text.match(/Fase:\s*([^\n\r]+)/i);
  const lines=text.split('\n');
  const starts={};
  lines.forEach((l,i)=>{
    const m=l.match(/([A-F])\.\s*(SUPLEMENTOS|ENTRENAMIENTO|NUTRICI[ÓO]N|OBJETIVOS|AJUSTES|FECHAS)/i);
    if(m) starts[m[1].toUpperCase()]=i;
  });
  const keys=['A','B','C','D','E','F'];
  const secs={};
  keys.forEach((k,idx)=>{
    if(starts[k]===undefined) return;
    const nxt=keys.slice(idx+1).find(x=>starts[x]!==undefined);
    secs[k]=lines.slice(starts[k],nxt?starts[nxt]:lines.length).join('\n');
  });
  return{
    macros:macros?{kcal:macros.kcal,p:macros.protein,hc:macros.carbs,g:macros.fat}:null,
    fase:faseM?faseM[1].trim():null,
    A:secs.A||'',B:secs.B||'',C:secs.C||'',D:secs.D||'',E:secs.E||'',F:secs.F||''
  };
}
function switchPlanTab(id,el){
  document.querySelectorAll('#plan-tabs .myplan-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.myplan-pane').forEach(p=>p.classList.remove('on'));

  document.getElementById('pane-'+id)?.classList.add('on');
}
function togglePlanBlk(id){document.getElementById(id)?.classList.toggle('on');}

function planBlocks(text,firstOpen){
  if(!text) return `<div class="plan-txt" style="color:var(--muted)">—</div>`;
  const rx=/(?:─|-){5,}\s*\n([^\n─-]+)\n(?:─|-){5,}\s*\n([\s\S]*?)(?=(?:─|-){5,}|$)/g;
  const blocks=[];let m;
  while((m=rx.exec(text))!==null) blocks.push({title:m[1].trim(),content:m[2].trim()});
  if(!blocks.length) return `<div class="plan-txt">${esc(text)}</div>`;
  return blocks.map((blk,i)=>{
    const id='pb'+(++_blkId);
    const t=blk.title;
    const icon=t.match(/FUERZA.+A|D[IÍ]A\s+A/i)?'🏋️ A':t.match(/FUERZA.+B|D[IÍ]A\s+B/i)?'🏋️ B':t.match(/INTERVAL/i)?'⚡':t.match(/TEMPO/i)?'🏃':t.match(/TIRADA/i)?'🛣️':t.match(/DESCANSO/i)?'😴':'📋';
    const isIv=blk.content.includes('Warmup')||blk.content.includes('Main set');
    const open=!!(firstOpen&&i===0);
    const safeT=JSON.stringify(blk.content);
    return `<div class="plan-blk">
      <div class="plan-blk-hdr" onclick="togglePlanBlk('${id}')">
        <div class="plan-blk-title">${icon} ${esc(blk.title)}</div>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${open?'▲':'▼'}</span>
      </div>
      <div class="plan-blk-body${open?' on':''}" id="${id}">
        ${isIv?`<div class="plan-intervals"><button class="plan-cpbtn" onclick="copyText(this,${safeT.replace(/"/g,'&quot;')})">📋 Copiar</button><pre>${esc(blk.content)}</pre></div>`:`<div class="plan-txt">${esc(blk.content)}</div>`}
      </div>
    </div>`;
  }).join('');
}

function planSupps(text){
  if(!text) return `<div class="plan-txt" style="color:var(--muted)">—</div>`;
  if((text.match(/(?:─|-){5,}/g)||[]).length>=2) return planBlocks(text,true);
  const lines=text.split('\n');
  const groups=[];let cur=null;
  lines.forEach(line=>{
    const t=line.trim();
    if(!t){if(cur&&cur.items.length){groups.push(cur);cur=null;}return;}
    const noIcon=!t.match(/^[·⚠✓🍋💊🐟☀️💪🌿🧘🪨⚡🥛🍌💧]/u);
    const isHdr=noIcon&&/^[A-ZÁÉÍÓÚÑ][A-ZÁÉÍÓÚÑ\s\-\(\)]+:?\s*$/.test(t)&&t.length>4&&t.length<80;
    if(isHdr){if(cur) groups.push(cur);cur={title:t.replace(/:$/,'').trim(),items:[]};}
    else if(cur) cur.items.push(t);
  });
  if(cur) groups.push(cur);
  if(!groups.length||groups.every(g=>!g.items.length)) return `<div class="plan-txt">${esc(text)}</div>`;
  const icMap={'LEVANTARTE':'🌅','AYUNAS':'🌅','DESAYUNO':'🍳','FUERZA':'🏋️','RUNNING':'🏃','ENTRENO':'⚡','CENAR':'🌙','ACOSTARTE':'😴','NOCHE':'😴','POST':'🥛','PRE':'⚡'};
  return groups.map((g,i)=>{
    const id='ps'+(++_blkId);
    const open=i<2;
    const icon=Object.entries(icMap).find(([k])=>g.title.toUpperCase().includes(k))?.[1]||'💊';
    return `<div class="plan-blk">
      <div class="plan-blk-hdr" onclick="togglePlanBlk('${id}')">
        <div class="plan-blk-title">${icon} ${esc(g.title)}</div>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${g.items.length} · ${open?'▲':'▼'}</span>
      </div>
      <div class="plan-blk-body${open?' on':''}" id="${id}"><div class="plan-txt">${g.items.map(esc).join('\n')}</div></div>
    </div>`;
  }).join('');
}

function planTomas(text){
  if(!text) return `<div class="plan-txt" style="color:var(--muted)">—</div>`;
  const macroL=(text.match(/MACROS DÍA ENTRENO:[^\n]+/i)||[])[0]||'';
  const macroR=(text.match(/MACROS DÍA DESCANSO:[^\n]+/i)||[])[0]||'';
  const rx=/(?:─|-){5,}\s*\n(TOMA[^\n─-]+)\n(?:─|-){5,}\s*\n([\s\S]*?)(?=(?:─|-){5,}|$)/gi;
  const tomas=[];let m;
  while((m=rx.exec(text))!==null) tomas.push({label:m[1].trim(),content:m[2].trim()});
  if(!tomas.length) return `<div class="plan-txt">${esc(text)}</div>`;
  const icMap={'TOMA 0':'🌅','TOMA 1':'🍳','TOMA 2':'🥪','TOMA 3':'🍽️','TOMA 4':'🌿','TOMA 5':'🌙','TOMA 6':'😴'};
  return `
  ${macroL?`<div style="background:rgba(91,156,246,.07);border:1px solid rgba(91,156,246,.2);border-radius:9px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);margin-bottom:10px;line-height:1.9">⚡ ${esc(macroL)}${macroR?'<br>'+esc(macroR):''}</div>`:''}
  ${tomas.map((t,i)=>{
    const id='pt'+(++_blkId);
    const icon=Object.entries(icMap).find(([k])=>t.label.toUpperCase().includes(k))?.[1]||'🍴';
    const kcalM=(t.content.match(/\((\d+)\s*ca(?:l|lorías)/i)||[])[1]||'';
    return `<div class="plan-toma">
      <div class="plan-toma-hdr" onclick="togglePlanBlk('${id}')">
        <div class="plan-toma-lbl">${icon} ${esc(t.label)}</div>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${kcalM?kcalM+' kcal · ':''}▼</span>
      </div>
      <div class="plan-toma-body" id="${id}"><div class="plan-txt">${esc(t.content)}</div></div>
    </div>`;
  }).join('')}`;
}

function planBiweeklyCalendar(q){
  const dayNames=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const typeIcons={strength:'🏋️',running:'🏃',rest:'😴'};
  let html='';
  for(let week=0;week<2;week++){
    html+=`<div class="cal-week-label">SEMANA ${week+1}</div><div class="cal-row">`;
    for(let wd=0;wd<7;wd++){
      const di=week*7+wd;
      const type=DAYTYPES[wd];

function planGoals(objText,fechasText){
  const src=(objText||'')+(fechasText?'\n'+fechasText:'');
  if(!src.trim()) return `<div class="plan-txt" style="color:var(--muted)">—</div>`;
  const metricRx=/^(PASOS\s*DIARIOS|SUEÑO|ADHERENCIA[^:\n]*|PESO[^:\n]*|MEDIDAS)[:\s]+([^\n]+)/gim;
  const metrics=[];let mm;
  while((mm=metricRx.exec(src))!==null) metrics.push({k:mm[1].trim(),v:mm[2].trim()});
  const greens=(src.match(/✓[^\n]+/g)||[]);
  const warns=(src.match(/⚠[^\n]+/g)||[]);
  const dateRx=/(?:Inicio|Fin|Pesaje|Fotos|Enviar)[^:\n]*:\s*([^\n]+)/gi;
  const dates=[];let dm;
  while((dm=dateRx.exec(fechasText||''))!==null) dates.push(dm[0].trim());
  const focoM=src.match(/FOCO QUINCENA[^\n]*\n([\s\S]*?)(?=SEÑALES|$)/i);
  const foco=focoM?(focoM[1].split('\n').map(l=>l.trim()).filter(l=>l&&!l.match(/^[━═─]+$/)).join('\n')):'' ;
  if(!metrics.length&&!greens.length&&!warns.length&&!dates.length&&!foco) return `<div class="plan-txt">${esc(src)}</div>`;
  return `
  ${metrics.length?`<div class="stitle">Métricas objetivo</div>
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:10px 13px;margin-bottom:12px">
    ${metrics.map(({k,v})=>`<div class="plan-obj-row"><span style="color:var(--muted)">${esc(k)}</span><span style="font-weight:700">${esc(v)}</span></div>`).join('')}
  </div>`:''}
  ${foco?`<div class="stitle">Foco de la quincena</div>
  <div style="background:rgba(91,156,246,.07);border:1px solid rgba(91,156,246,.2);border-radius:9px;padding:9px 12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);line-height:1.8;margin-bottom:12px">${esc(foco)}</div>`:''}
  ${greens.length?`<div class="stitle">Señales verdes ✓</div>
  <div style="margin-bottom:12px">${greens.map(g=>`<div class="plan-sig plan-sig-g">${esc(g)}</div>`).join('')}</div>`:''}
  ${warns.length?`<div class="stitle">Señales de alerta ⚠</div>
  <div style="margin-bottom:12px">${warns.map(w=>`<div class="plan-sig plan-sig-w">${esc(w)}</div>`).join('')}</div>`:''}
  ${dates.length?`<div class="stitle">Fechas clave</div>
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:10px 13px">
    ${dates.map(d=>`<div class="plan-adj">${esc(d)}</div>`).join('')}
  </div>`:''}`;
}

`═══════════════════════════════════════════════════════

${hasSc?`
BÁSCULA INTELIGENTE (medición final Q${q})
Peso:                     ${sc.peso||'n/d'} kg

Grasa corporal:           ${sc.fat||'n/d'} %

Grasa visceral:           ${sc.visceral||'n/d'} (índice)
Agua corporal:            ${sc.water||'n/d'} %
Músculo esquelético:      ${sc.muscle||'n/d'} %
Masa muscular:            ${sc.musclemass||'n/d'} kg
Masa ósea:                ${sc.bone||'n/d'} kg
Proteína corporal:        ${sc.protein||'n/d'} %
BMR:                      ${sc.bmr||'n/d'} Kcal
Edad metabólica:          ${sc.metage||'n/d'} años`:''}

OBSERVACIONES
${nv||'—'}

LOG DIARIO Q${q} (14 días)
${daysSummary||'  Sin datos registrados en el Día Activo'}

CSV INTERVALS.ICU
${csv||'(no proporcionado)'}

FOTOS: [ADJUNTAR FRENTE · LATERAL · ESPALDA]

═══════════════════════════════════════════════════════
INSTRUCCIÓN C.L.O.E. · ANÁLISIS Y PLAN Q${q+1}
═══════════════════════════════════════════════════════

Actúa como C.L.O.E. COACH (Crush Limits Or Explode).
Analiza el reporte completo y genera el plan Q${q+1}.
Si algún dato necesario no está en el reporte, escribe "SIN DATOS" en ese campo. No completes huecos con entrenos, dieta, ritmos o suplementos genéricos.

ANÁLISIS OBLIGATORIO:

- Si masa muscular baja (<62kg en este perfil): aumentar proteína 10-15%

F. FECHAS: inicio, pesaje, fotos, envío reporte
═══════════════════════════════════════════════════════`;

          <pre>${rs.fmt}</pre>
        </div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);border-left:2px solid var(--accent2);padding-left:9px;margin-bottom:10px">💡 ${rs.goal}</div>
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Registro post-sesión</div>
        <div class="g2" style="gap:7px">
          <div><label>Ritmo medio logrado</label><input type="text" id="mrun_pace" placeholder="6:30/km" value="${rl.pace||''}" inputmode="text"></div>
          <div><label>Distancia (km)</label><input type="number" id="mrun_dist" placeholder="5.2" value="${rl.dist||''}" inputmode="decimal"></div>
          <div><label>Tiempo (min)</label><input type="number" id="mrun_time" placeholder="35" value="${rl.time||''}" inputmode="numeric"></div>
          <div><label>Sensación RPE (1-10)</label><input type="number" id="mrun_feel" placeholder="7" min="1" max="10" value="${rl.feel||''}" inputmode="numeric"></div>
        </div>
      </div>`;
    }
  }

  // ── DESCANSO ──
  if(type==='rest'){
    html+=`<div class="mob-section">
      <div class="mob-section-title">😴 Descanso activo</div>
      <div class="mob-rest-card">
        <div class="mob-rest-icon">🌿</div>
        <div style="font-size:13px;font-weight:800;margin-bottom:6px">Día de recuperación</div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);line-height:1.7">Movilidad suave · foam roller 10min · paseo tranquilo<br>La recuperación es parte del entrenamiento. Sin culpa.</div>
      </div>
    </div>`;
  }

  // ── NUTRICIÓN CON OPCIONES ──
  html+=`<div class="mob-section">
    <div class="mob-section-title">🥗 Nutrición del día</div>
    ${nutr.meals.map(meal=>{
      const done=!!(log.meals?.[meal.key]);
      if(!meal.options){
        const mm=meal.macros||{};
        return `<div class="mob-meal">
        <div class="mob-meal-hdr" onclick="toggleMobMeal('${meal.key}')">
          <div class="mob-meal-left">
            <div class="mob-meal-name">${esc(meal.name)}</div>
            <div class="mob-meal-meta">${meal.kcal?'~'+meal.kcal+' kcal · ':''}${mm.protein?mm.protein+'g P · ':''}MI PLAN</div>
          </div>
          <div class="mob-meal-check ${done?'done':''}" id="mmcheck_${meal.key}">${done?'✓':''}</div>
        </div>
        <div class="mob-meal-body" id="mmbody_${meal.key}">
          ${meal.content.split('\n').map(line=>line.trim()).filter(Boolean).map(line=>`<div class="mob-food-row"><span>${esc(line)}</span></div>`).join('')}
          <button class="mob-mark-btn ${done?'done':''}" onclick="markMeal('${meal.key}')">
            ${done?'✓ Completada - toca para desmarcar':'Marcar como completada'}
          </button>
        </div>
      </div>`;
      }
      const selOpt=log.mealOpts?.[meal.key]||0;
      const opt=meal.options[selOpt];
      return `<div class="mob-meal">
        <div class="mob-meal-hdr" onclick="toggleMobMeal('${meal.key}')">
          <div class="mob-meal-left">
            <div class="mob-meal-name">${meal.name}</div>
            <div class="mob-meal-meta">~${opt.kcal} kcal · ${opt.p}g P · Opción: ${opt.label.split('·')[0]}</div>
          </div>
          <div class="mob-meal-check ${done?'done':''}" id="mmcheck_${meal.key}">${done?'✓':''}</div>
        </div>
        <div class="mob-meal-body" id="mmbody_${meal.key}">
          <div class="mob-opt-tabs">
            ${meal.options.map((o,i)=>`<button class="mob-opt-btn ${i===selOpt?'sel':''}" onclick="selectMobMealOpt('${meal.key}',${i})">${o.label.split('·')[0]}</button>`).join('')}
          </div>
          <div id="mmopt_${meal.key}">
            ${opt.items.map(it=>`<div class="mob-food-row">
              <span>${it.f}${it.note?` <span style="color:var(--accent3);font-size:9px">· ${it.note}</span>`:''}</span>
              <span class="mob-food-amt">${it.a}</span>
            </div>`).join('')}
          </div>
          <button class="mob-mark-btn ${done?'done':''}" onclick="markMeal('${meal.key}')">
            ${done?'✓ Completada — toca para desmarcar':'Marcar como completada'}
          </button>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // ── OBSERVACIONES ──
  html+=`<div class="mob-section">
    <div class="mob-section-title">📝 Observaciones del día</div>
    <textarea class="mob-obs-ta" id="mob-obs" placeholder="Cómo te has sentido, dolores, energía, notas para tu coach...">${log.obs||''}</textarea>
  </div>`;

  // Día activo: sin checklist diario en esta vista.

  document.getElementById('mob-body').innerHTML=html;
  updateMobStatus(q,d);
}

// ── MOBILE INTERACTIONS ───────────────────────────────────
function toggleSupp(key,q,d){
  const log=loadDayLog(q,d);
  if(!log.supps) log.supps={};
  log.supps[key]=!log.supps[key];
  saveDayLog(q,d,log);
  const el=document.getElementById(`${key}_done`)||document.querySelector(`[onclick*="${key}"]`);
  renderMobileDay();
}

function toggleSetDone(key,si){
  const timeline=getTimelineInfo(); const q=timeline.q||getQuincena(profile?.week||1);
  const log=loadDayLog(q,mobDayIdx);
  if(!log.sets) log.sets={};
  if(!log.sets[key]) log.sets[key]=[];
  if(!log.sets[key][si]) log.sets[key][si]={};
  const kgEl=document.getElementById(`ms_${key}_${si}_kg`);
  const repsEl=document.getElementById(`ms_${key}_${si}_reps`);
  const rirEl=document.getElementById(`ms_${key}_${si}_rir`);
  if(kgEl) log.sets[key][si].kg=kgEl.value;
  if(repsEl) log.sets[key][si].reps=repsEl.value;
  if(rirEl) log.sets[key][si].rir=rirEl.value;
  log.sets[key][si].done=!log.sets[key][si].done;
  if(kgEl?.value) setPrevWeight(key,kgEl.value);
  saveDayLog(q,mobDayIdx,log);
  const btn=document.getElementById(`ms_${key}_${si}_done`);
  if(btn) btn.classList.toggle('ok',log.sets[key][si].done);
  updateMobStatus(q,mobDayIdx);
}

function toggleMobMeal(key){
  const body=document.getElementById('mmbody_'+key);
  if(body) body.classList.toggle('open');
}

function selectMobMealOpt(key,idx){
  const timeline=getTimelineInfo(); const q=timeline.q||getQuincena(profile?.week||1);
  const log=loadDayLog(q,mobDayIdx);
  if(!log.mealOpts) log.mealOpts={};
  log.mealOpts[key]=idx;
  saveDayLog(q,mobDayIdx,log);
  // update tabs
  const tabs=document.querySelectorAll(`[onclick*="selectMobMealOpt('${key}'"]`);
  tabs.forEach((t,i)=>t.classList.toggle('sel',i===idx));
  // update content
  const N=getNutrition();
  const isRest=DAYTYPES[mobDayIdx%7]==='rest';
  const nutr=isRest?(N.rest||N.training):N.training;
  const meal=nutr.meals.find(m=>m.key===key);
  if(!meal||!meal.options) return;
  const opt=meal.options[idx];
  const optEl=document.getElementById('mmopt_'+key);
  if(optEl) optEl.innerHTML=opt.items.map(it=>`<div class="mob-food-row">
    <span>${it.f}${it.note?` <span style="color:var(--accent3);font-size:9px">· ${it.note}</span>`:''}</span>
    <span class="mob-food-amt">${it.a}</span>
  </div>`).join('');
}

function markMeal(key){
  const timeline=getTimelineInfo(); const q=timeline.q||getQuincena(profile?.week||1);
  const log=loadDayLog(q,mobDayIdx);
  if(!log.meals) log.meals={};
  log.meals[key]=!log.meals[key];
  saveDayLog(q,mobDayIdx,log);
  const done=log.meals[key];
  const check=document.getElementById('mmcheck_'+key);
  const btn=document.querySelector(`[onclick="markMeal('${key}')"]`);
  if(check){check.classList.toggle('done',done);check.textContent=done?'✓':'';}
  if(btn){btn.textContent=done?'✓ Completada — toca para desmarcar':'Marcar como completada';btn.classList.toggle('done',done);}
  updateMobStatus(q,mobDayIdx);
}

function saveDayData(){
  const timeline=getTimelineInfo(); const q=timeline.q||getQuincena(profile?.week||1);
  const log=loadDayLog(q,mobDayIdx);
  const wd=mobDayIdx%7;
  const type=DAYTYPES[wd];
  // collect set data
  if(type==='strength'){
    if(getPlanStrengthForDay(mobDayIdx)){
      log.sets=log.sets||{};
      saveDayLog(q,mobDayIdx,log);
      updateMobStatus(q,mobDayIdx);
      const btn=document.querySelector('.mob-save-btn');
      if(btn){btn.textContent='Guardado';setTimeout(()=>btn.textContent='Guardar dia',2000);}
      return;
    }
    const {exList}=getStrengthIntervals(wd===0?'A':'B',q);
    if(!log.sets) log.sets={};
    exList.forEach(ex=>{
      if(!log.sets[ex.key]) log.sets[ex.key]=[];
      for(let si=0;si<ex.sets;si++){
        if(!log.sets[ex.key][si]) log.sets[ex.key][si]={};
        const kgEl=document.getElementById(`ms_${ex.key}_${si}_kg`);
        const repsEl=document.getElementById(`ms_${ex.key}_${si}_reps`);
        const rirEl=document.getElementById(`ms_${ex.key}_${si}_rir`);
        if(kgEl) log.sets[ex.key][si].kg=kgEl.value;
        if(repsEl) log.sets[ex.key][si].reps=repsEl.value;
        if(rirEl) log.sets[ex.key][si].rir=rirEl.value;
        if(kgEl?.value) setPrevWeight(ex.key,kgEl.value);
      }
    });
  }
  if(type==='running'){
    log.running={
      pace:document.getElementById('mrun_pace')?.value||'',
      dist:document.getElementById('mrun_dist')?.value||'',
      time:document.getElementById('mrun_time')?.value||'',
      feel:document.getElementById('mrun_feel')?.value||'',
    };
  }
  log.obs=document.getElementById('mob-obs')?.value||'';
  saveDayLog(q,mobDayIdx,log);
  updateMobStatus(q,mobDayIdx);
  const btn=document.querySelector('.mob-save-btn');
  if(btn){btn.textContent='✅ Guardado';setTimeout(()=>btn.textContent='💾 Guardar día',2000);}
}

function updateMobStatus(q,d){
  const wd=d%7;
  const log=loadDayLog(q,d);const type=DAYTYPES[wd];const parts=[];
  if(type==='strength'&&getPlanStrengthForDay(d)){
    parts.push('fuerza MI PLAN');
  }else if(type==='strength'&&log.sets){
    const {exList}=getStrengthIntervals(wd===0?'A':'B',q);
    const done=exList.reduce((acc,ex)=>acc+(log.sets[ex.key]||[]).filter(s=>s&&s.done).length,0);
    const total=exList.reduce((acc,ex)=>acc+ex.sets,0);
    if(done>0) parts.push(`${done}/${total} series`);
  }
  if(type==='running'&&log.running?.pace) parts.push(log.running.pace);
  if(log.meals){const mc=Object.values(log.meals).filter(Boolean).length;if(mc>0) parts.push(`${mc}/6 tomas`);}
  if(log.supps){const sc=Object.values(log.supps).filter(Boolean).length;if(sc>0) parts.push(`${sc} supps`);}
  if(log.obs) parts.push('obs ✓');
  document.getElementById('mob-status-text').textContent=parts.join(' · ')||'sin datos';
}

function toggleMobChk(q,d,key){
  const fullKey=`q${q}_d${d}_${key}`;
  checklist[fullKey]=!checklist[fullKey];
  localStorage.setItem('cloe_chk_'+profile.id,JSON.stringify(checklist));
  renderMobileDay();
}

// ── UTILS ─────────────────────────────────────────────────
function toggleChk(key){
  checklist[key]=!checklist[key];
  localStorage.setItem('cloe_chk_'+profile.id,JSON.stringify(checklist));
  view(currentView);
}
function copyPlan(){
  navigator.clipboard.writeText(document.getElementById('plan-body').textContent)
    .then(()=>{const b=document.querySelector('.plan-viewer-hdr .btn');if(b){b.textContent='✅';setTimeout(()=>b.textContent='📋 Copiar',2000);}});
}
function copyReport(){
  const a=document.getElementById('rep-text');a.select();document.execCommand('copy');
  const b=document.getElementById('rep-btn');b.textContent='✅ Copiado';setTimeout(()=>b.textContent='📋 Copiar reporte',2500);
}
function copyText(btn,text){
  navigator.clipboard.writeText(text).then(()=>{const o=btn.textContent;btn.textContent='✅';setTimeout(()=>btn.textContent=o,2000);});
}
async function logout(){await sb.auth.signOut();window.location.href='login.html';}
</script>
