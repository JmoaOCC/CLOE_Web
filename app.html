<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>C.L.O.E. COACH</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0c1018;--surface:#151b28;--surface2:#1c2433;--border:#2b3448;
  --accent:#c8f135;--accent2:#5b9cf6;--accent3:#f1a135;--text:#eef4ff;--muted:#9aa7bd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Syne,sans-serif;min-height:100vh}

/* ── DESKTOP LAYOUT ── */
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
.sidebar{background:#101622;padding:20px 16px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{font-size:24px;font-weight:800;margin-bottom:2px}.brand span{color:var(--accent)}
.tagline{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;margin-bottom:12px}
.user-info{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin-bottom:12px}
.user-name{font-size:13px;font-weight:700;margin-bottom:2px}
.user-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.ns{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:8px 0 3px}
.nav button{display:flex;align-items:center;gap:8px;width:100%;background:transparent;color:var(--muted);border:none;padding:8px 10px;border-radius:10px;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;text-align:left;transition:all .2s}
.nav button:hover{background:var(--surface2);color:var(--text)}
.nav button.on{background:var(--surface2);color:var(--accent);border-left:2px solid var(--accent)}
.nav button .ic{font-size:13px;width:16px;text-align:center}
.week-pill{font-family:'DM Mono',monospace;font-size:10px;background:var(--surface2);border:1px solid var(--border);padding:7px 10px;border-radius:10px;color:var(--muted);margin-top:auto}
.week-pill span{color:var(--accent);font-weight:500}
.mobile-btn-sidebar{width:100%;background:linear-gradient(135deg,var(--accent),#9ec900);color:#111;border:none;padding:10px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:12px;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px}

.main{padding:24px;overflow-y:auto}
.ph{margin-bottom:18px}.ph h1{font-size:21px;font-weight:800}
.ph p{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:18px}
.card{background:var(--surface);padding:14px;border-radius:14px;border:1px solid var(--border)}
.cl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.cv{font-size:26px;font-weight:800;font-family:'DM Mono',monospace}
.cv.a{color:var(--accent)}.cv.b{color:var(--accent2)}.cv.o{color:var(--accent3)}
.cs{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
.stitle{font-size:13px;font-weight:800;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.day-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px}
.day-tab{font-family:'DM Mono',monospace;font-size:11px;padding:6px 11px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .2s}
.day-tab:hover{color:var(--text)}
.day-tab.active{background:var(--accent);color:#111;border-color:var(--accent);font-weight:500}
.workout-block{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.workout-header{background:var(--surface2);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.workout-title{font-size:13px;font-weight:800}
.workout-badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:6px}
.wb-s{color:var(--accent3);border:1px solid var(--accent3)}
.wb-r{color:var(--accent);border:1px solid var(--accent)}
.workout-body{padding:14px}
.exercise-row{padding:9px 11px;border-radius:10px;background:var(--surface2);margin-bottom:7px;border:1px solid transparent}
.ex-top{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}
.ex-name{font-size:12px;font-weight:700}
.ex-detail{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.ex-rir{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent3);background:rgba(241,161,53,.1);padding:2px 7px;border-radius:6px}
.ex-prog{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2)}
.ex-inputs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.intervals-block{background:#070e1c;border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:9px;position:relative}
.intervals-block pre{white-space:pre-wrap;color:var(--accent);line-height:1.9;font-size:11px;font-family:'DM Mono',monospace}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 9px;border-radius:6px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer}
.copy-btn:hover{color:var(--accent);border-color:var(--accent)}
.session-goal{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:9px 11px;background:var(--surface2);border-radius:8px;margin-top:9px;line-height:1.7;border-left:2px solid var(--accent2)}
.meal-day-tabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.meal-day-tab{font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer}
.meal-day-tab.active{color:var(--accent);border-color:var(--accent)}
.macro-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.macro-item{text-align:center;background:var(--surface2);padding:9px;border-radius:10px}
.macro-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--accent)}
.macro-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;text-transform:uppercase}
.meal-block{background:var(--surface2);border-radius:12px;padding:13px;border:1px solid var(--border);margin-bottom:9px}
.meal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.meal-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.meal-kcal{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.meal-macros{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2);margin-top:2px}
.food-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(43,52,72,.4)}
.food-row:last-child{border-bottom:none}
.food-name{font-size:11px}.food-amount{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.etag{font-family:'DM Mono',monospace;font-size:8px;padding:1px 5px;border-radius:4px;margin-left:4px;background:rgba(91,156,246,.1);color:var(--accent2);border:1px solid rgba(91,156,246,.2)}
.nutrition-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:7px 9px;background:var(--bg);border-radius:8px;border-left:2px solid var(--accent3);line-height:1.7;margin-top:5px}
.plan-viewer{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px}
.plan-viewer-hdr{background:var(--surface2);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.plan-viewer-title{font-size:12px;font-weight:800}
.plan-viewer-body{padding:16px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.9;color:var(--text);white-space:pre-wrap;max-height:65vh;overflow-y:auto}
.plan-viewer-body.empty{color:var(--muted)}
.chk{display:flex;align-items:center;gap:11px;padding:9px;background:var(--surface2);border-radius:10px;margin-bottom:6px;cursor:pointer;border:1px solid var(--border);transition:all .2s}
.chk.done{border-color:var(--accent);background:rgba(200,241,53,.04)}
.chkbox{width:19px;height:19px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.chk.done .chkbox{background:var(--accent);border-color:var(--accent);color:#111}
.chkt{font-size:12px;font-weight:700}.chks{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:1px}
.report-area{width:100%;background:#070e1c;color:var(--accent);border:1px solid var(--border);border-radius:10px;padding:13px;font-family:'DM Mono',monospace;font-size:11px;line-height:1.9;min-height:280px;resize:vertical;outline:none}
.alert{background:rgba(200,241,53,.07);border:1px solid rgba(200,241,53,.25);border-radius:10px;padding:10px 13px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:11px;line-height:1.6}
.btn{background:var(--accent);color:#111;border:none;padding:9px 16px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:12px;cursor:pointer;transition:opacity .2s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
input,textarea,label{font-family:'DM Mono',monospace}
input,textarea{width:100%;background:#0f1624;color:var(--text);border:1px solid var(--border);padding:8px 11px;border-radius:10px;font-size:11px;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--accent2)}
label{font-size:10px;color:var(--muted);display:block;margin-top:9px;margin-bottom:3px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.plan-row{display:grid;grid-template-columns:65px 95px 1fr;gap:9px;align-items:center;padding:8px 11px;background:var(--surface2);border-radius:10px;font-family:'DM Mono',monospace;font-size:10px;margin-bottom:5px}
.loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'DM Mono',monospace;color:var(--muted);font-size:13px}

/* ── MOBILE OVERLAY ── */
.mob-overlay{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;background:var(--bg)}
.mob-overlay.open{display:flex}
.mob-topbar{background:#101622;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mob-brand{font-size:18px;font-weight:800}.mob-brand span{color:var(--accent)}
.mob-close{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.mob-day-bar{background:#101622;border-bottom:1px solid var(--border);padding:10px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.mob-day-btn{font-family:'DM Mono',monospace;font-size:10px;padding:5px 10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s}
.mob-day-btn.on{background:var(--accent);color:#111;border-color:var(--accent);font-weight:500}
.mob-body{flex:1;overflow-y:auto;padding:14px 14px 80px;-webkit-overflow-scrolling:touch}
/* sections */
.mob-section{margin-bottom:18px}
.mob-section-title{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.mob-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
/* exercise cards */
.mob-ex{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px;margin-bottom:8px}
.mob-ex-name{font-size:13px;font-weight:800;margin-bottom:2px}
.mob-ex-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:10px}
.mob-ex-rir{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;color:var(--accent3);background:rgba(241,161,53,.1);padding:2px 7px;border-radius:5px;margin-left:6px}
.mob-sets{display:grid;gap:6px}
.mob-set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr;gap:6px;align-items:center}
.mob-set-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:center}
.mob-set-input{background:#0f1624;color:var(--text);border:1px solid var(--border);padding:7px 9px;border-radius:8px;font-family:'DM Mono',monospace;font-size:12px;outline:none;text-align:center;width:100%}
.mob-set-input:focus{border-color:var(--accent2)}
.mob-set-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center}
.mob-set-done{width:28px;height:28px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0}
.mob-set-done.ok{background:var(--accent);border-color:var(--accent);color:#111}
.mob-prog-hint{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2);margin-top:6px}
/* running card */
.mob-run-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:8px}
.mob-run-hdr{background:var(--surface2);padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mob-run-title{font-size:13px;font-weight:800}
.mob-run-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);border:1px solid var(--accent);padding:2px 8px;border-radius:5px}
.mob-run-body{padding:12px}
.mob-run-fmt{background:#070e1c;border-radius:10px;padding:12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);line-height:1.9;white-space:pre-wrap;margin-bottom:10px;position:relative}
.mob-copy-btn{position:absolute;top:6px;right:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer}
.mob-run-goal{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);line-height:1.7;border-left:2px solid var(--accent2);padding-left:10px}
.mob-run-log{margin-top:10px}
/* meal cards */
.mob-meal{background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.mob-meal-hdr{background:var(--surface2);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border-bottom:1px solid transparent}
.mob-meal-hdr.open{border-bottom-color:var(--border)}
.mob-meal-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase}
.mob-meal-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.mob-meal-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .2s}
.mob-meal-check.done{background:var(--accent);border-color:var(--accent);color:#111}
.mob-meal-body{padding:10px 12px;display:none}
.mob-meal-body.open{display:block}
.mob-food-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(43,52,72,.3);font-size:11px}
.mob-food-row:last-child{border-bottom:none}
.mob-food-amt{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
/* rest card */
.mob-rest-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:20px;text-align:center}
.mob-rest-icon{font-size:36px;margin-bottom:10px}
.mob-rest-title{font-size:15px;font-weight:800;margin-bottom:6px}
.mob-rest-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.7}
/* observations */
.mob-obs{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:12px}
.mob-obs-ta{background:#0f1624;color:var(--text);border:1px solid var(--border);padding:10px;border-radius:10px;font-family:'DM Mono',monospace;font-size:12px;width:100%;outline:none;min-height:90px;resize:none;line-height:1.7}
.mob-obs-ta:focus{border-color:var(--accent2)}
/* bottom save bar */
.mob-save-bar{position:fixed;bottom:0;left:0;right:0;background:#101622;border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;z-index:1001}
.mob-save-btn{flex:1;background:var(--accent);color:#111;border:none;padding:11px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:13px;cursor:pointer}
.mob-day-summary{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.mob-day-summary span{color:var(--accent);font-weight:500}

@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto}
}
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">Cargando tu plan C.L.O.E....</div>

<!-- DESKTOP APP -->
<div class="app" id="app-shell" style="display:none">
<aside class="sidebar">
  <div class="brand">C.L.O.E. <span>COACH</span></div>
  <div class="tagline">Crush Limits Or Explode</div>
  <div class="user-info">
    <div class="user-name" id="sb-name">—</div>
    <div class="user-meta" id="sb-goal">—</div>
  </div>
  <div class="ns">Core</div>
  <div class="nav">
    <button class="on" onclick="view('dashboard')"><span class="ic">⚡</span>Dashboard</button>
    <button onclick="view('training')"><span class="ic">🏋️</span>Fuerza</button>
    <button onclick="view('running')"><span class="ic">🏃</span>Running</button>
    <button onclick="view('nutrition')"><span class="ic">🥗</span>Nutrición DOCE</button>
  </div>
  <div class="ns">Gestión</div>
  <div class="nav">
    <button onclick="view('plan')"><span class="ic">📅</span>Plan 16 semanas</button>
    <button onclick="view('myplan')"><span class="ic">📋</span>Mi plan</button>
    <button onclick="view('report')"><span class="ic">📊</span>Generar reporte</button>

<main class="main" id="main"></main>
</div>

<!-- MOBILE OVERLAY -->
<div class="mob-overlay" id="mob-overlay">
  <div class="mob-topbar">
    <div>
      <div class="mob-brand">C.L.O.E <span>COACH</span></div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)" id="mob-date-label">—</div>

    <button class="mob-close" onclick="closeMobile()">✕</button>
  </div>

  <div class="mob-day-bar" id="mob-day-bar"></div>

  <div class="mob-body" id="mob-body"></div>

  <div class="mob-save-bar">
    <div class="mob-day-summary">Guardado: <span id="mob-save-status">—</span></div>
    <button class="mob-save-btn" onclick="saveDayData()">💾 Guardar día</button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const SB_URL = 'https://wxvgxcogrlcflxldaemw.supabase.co';
const SB_KEY = 'sb_publishable_MxUoL5CYRj9LP4Kiuueg9A_tYkA69gq';
// ─────────────────────────────────────────────────────────

const {createClient} = supabase;
const sb = createClient(SB_URL, SB_KEY);

let profile = null;
let checklist = {};
let dayLogs = {};     // {date_dayIdx: {sets, running, meals, obs}}
let currentView = 'dashboard';
let trainingTab = 0;
let runningTab = 0;
let nutritionTab = 0;
let mobDayIdx = new Date().getDay(); // 0=Dom → map to plan
// Day mapping: JS getDay() 0=Sun,1=Mon,...6=Sat → plan 0=Mon...6=Sun
function todayPlanIdx(){ const d=new Date().getDay(); return d===0?6:d-1; }

const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const DAYLABELS=['FUERZA A','INTERVALOS','DESCANSO','FUERZA B','TEMPO','TIRADA LARGA','DESCANSO'];
const DAYTYPES=['strength','running','rest','strength','running','running','rest'];

function phase(w){return w<=4?'BASE':w<=8?'VOLUMEN':w<=12?'RITMO':'ESPECÍFICO';}
function getPaces(w){
  if(w<=4)  return {easy:'6:45',tempo:'5:50',interval:'5:20'};
  if(w<=8)  return {easy:'6:30',tempo:'5:40',interval:'5:10'};
  if(w<=12) return {easy:'6:15',tempo:'5:30',interval:'5:00'};
  return          {easy:'6:00',tempo:'5:20',interval:'4:55'};
}

];
function getExercises(day,w){
  return (day==='A'?EX_A:EX_B).map(ex=>{
    let s=ex.sets;
    if(w>=5&&['prensa','remo','hack','jalon','rdl','hipthrust'].includes(ex.key)) s=4;
    if(w>=9) s=Math.min(s+1,5);
    return {...ex,sets:s};
  });
}

// ── RUNNING ───────────────────────────────────────────────
function runIntervals(w){
  const p=getPaces(w);
  let sets,dist,wMin,rDur,rKm;
  if(w<=4){sets=6;dist='400m';wMin='2m30s';rDur='2m';rKm='0.22km';}
  else if(w<=8){sets=8;dist='400m';wMin='2m30s';rDur='90s';rKm='0.18km';}
  else if(w<=12){sets=6;dist='800m';wMin='5m';rDur='2m';rKm='0.22km';}
  else{sets=4;dist='1200m';wMin='7m';rDur='2m30s';rKm='0.27km';}
  const wKm=dist==='400m'?'0.40km':dist==='800m'?'0.80km':'1.20km';
  return {
    label:'INTERVALOS',
    fmt:`Warmup\n10m ${p.easy}/km (1.4km) Pace\n\nMain set ${sets}x\n${wMin} ${p.interval}/km (${wKm}) Pace\n${rDur} ${p.easy}/km (${rKm}) Pace\n\nCooldown\n10m ${p.easy}/km (1.4km) Pace`,
    goal:`${sets}×${dist} a ${p.interval}/km. Recuperación ${rDur} trot suave.`
  };
}
function runTempo(w){
  const p=getPaces(w);
  const dur=w<=4?20:w<=8?25:w<=12?30:35;
  const [mm,ss]=p.tempo.split(':').map(Number);
  const km=(dur/(mm+ss/60)).toFixed(1);
  return {
    label:'TEMPO',
    fmt:`Warmup\n10m ${p.easy}/km (1.4km) Pace\n\nMain set\n${dur}m ${p.tempo}/km (~${km}km) Pace\n\nCooldown\n10m ${p.easy}/km (1.4km) Pace`,
    goal:`${dur}min a ${p.tempo}/km. Umbral de lactato. Esfuerzo controlado.`
  };
}
function runLong(w){
  const p=getPaces(w);
  const dur=w<=4?50:w<=8?65:w<=12?75:90;
  const [mm,ss]=p.easy.split(':').map(Number);
  const km=(dur/(mm+ss/60)).toFixed(1);
  return {
    label:'TIRADA LARGA',
    fmt:`Easy Run\n${dur}m ${p.easy}/km (~${km}km) Pace`,
    goal:`${dur}min completamente conversacional. No superes ${p.easy}/km.`
  };
}
function getRunSession(dayIdx, w){
  if(dayIdx===1) return runIntervals(w);
  if(dayIdx===4) return runTempo(w);
  if(dayIdx===5) return runLong(w);
  return null;
}

function view(v){
  currentView=v;
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
  const map={dashboard:0,training:1,running:2,nutrition:3,plan:4,myplan:5,report:6,checkin:7};
  document.querySelectorAll('.nav button')[map[v]]?.classList.add('on');
  document.getElementById('main').innerHTML=renderView();
}
function renderView(){
  const w=profile?.week||1;
  switch(currentView){
    case 'dashboard': return renderDashboard(w);
    case 'training':  return renderTraining(w);
    case 'running':   return renderRunning(w);
    case 'nutrition': return renderNutrition(w);
    case 'plan':      return renderPlan(w);
    case 'myplan':    return renderMyPlan(w);
    case 'report':    return renderReport(w);
    case 'checkin':   return renderCheckin(w);
  }
  return '';
}

    {k:'protein',t:'Proteína objetivo',s:'Comprueba el total diario'},
    {k:'hydro',t:'Hidratación 2.5L',s:'Fundamental en días de entreno'},
    {k:'mob',t:'Movilidad / foam',s:'5-10min tras entreno'},
  ];
  return `
  <div class="ph"><h1>Checklist · ${today}</h1></div>
  ${items.map(item=>{
    const key=`w${w}_${today}_${item.k}`;const d=!!checklist[key];
    return `<div class="chk ${d?'done':''}" onclick="toggleChk('${key}')">
      <div class="chkbox">${d?'✓':''}</div>
      <div><div class="chkt">${item.t}</div><div class="chks">${item.s}</div></div>
    </div>`;
  }).join('')}`;
}

// ── MOBILE VIEW ───────────────────────────────────────────
function openMobile(){
  mobDayIdx=todayPlanIdx();
  document.getElementById('mob-overlay').classList.add('open');
  renderMobileDayBar();
  renderMobileDay();
}
function closeMobile(){ document.getElementById('mob-overlay').classList.remove('open'); }

function renderMobileDayBar(){
  const bar=document.getElementById('mob-day-bar');
  bar.innerHTML=DAYS.map((d,i)=>`
    <button class="mob-day-btn ${i===mobDayIdx?'on':''}" onclick="setMobDay(${i})">${d}<br><span style="font-size:9px">${DAYLABELS[i]}</span></button>
  `).join('');
}

function setMobDay(i){
  mobDayIdx=i;
  renderMobileDayBar();
  renderMobileDay();
}

function renderMobileDay(){
  const w=profile?.week||1;
  const d=mobDayIdx;
  const type=DAYTYPES[d];
  const N=getNutrition();
  const isRest=['rest','running'].includes(type)?type==='rest':false;
  const meals=(type==='rest'?N.rest:N.training).meals;
  const log=loadDayLog(w,d);
  const today=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('mob-date-label').textContent=`${DAYS[d]} · ${DAYLABELS[d]} · S${w}`;

  let html='';

  // ── STRENGTH ──
  if(type==='strength'){
    const exList=getExercises(d===0?'A':'B',w);
    html+=`<div class="mob-section">
      <div class="mob-section-title">🏋️ Fuerza — Día ${d===0?'A':'B'}</div>
      ${exList.map(ex=>{
        const prev=getPrevWeight(ex.key);
        const target=prev>0?(prev+(ex.prog==='upper'?2.5:5)):null;
        const savedSets=log.sets?.[ex.key]||[];
        let setsHtml=`<div class="mob-set-row" style="margin-bottom:4px">
          <div></div>
          <div class="mob-set-label">Peso (kg)</div>
          <div class="mob-set-label">Reps</div>
          <div class="mob-set-label">✓</div>
        </div>`;
        for(let si=0;si<ex.sets;si++){
          const sv=savedSets[si]||{};
          setsHtml+=`<div class="mob-set-row">
            <div class="mob-set-num">S${si+1}</div>
            <input class="mob-set-input" type="number" placeholder="${target?target:''}" value="${sv.kg||''}" id="s_${ex.key}_${si}_kg" inputmode="decimal">
            <input class="mob-set-input" type="number" placeholder="${ex.reps}" value="${sv.reps||''}" id="s_${ex.key}_${si}_reps" inputmode="numeric">
            <button class="mob-set-done ${sv.done?'ok':''}" id="s_${ex.key}_${si}_done" onclick="toggleSetDone('${ex.key}',${si})">✓</button>
          </div>`;
        }
        return `<div class="mob-ex">
          <div class="mob-ex-name">${ex.name}<span class="mob-ex-rir">${ex.rir}</span></div>
          <div class="mob-ex-meta">${ex.sets} series × ${ex.reps} reps · ${ex.muscle}</div>
          <div class="mob-sets">${setsHtml}</div>
          ${target?`<div class="mob-prog-hint">→ Objetivo: ${target}kg (era ${prev}kg)</div>`:'<div class="mob-prog-hint">Primera semana — elige un peso cómodo</div>'}
        </div>`;
      }).join('')}
    </div>`;
  }

  // ── RUNNING ──
  if(type==='running'){
    const rs=getRunSession(d,w);
    if(rs){
      const rl=log.running||{};
      html+=`<div class="mob-section">
        <div class="mob-section-title">🏃 ${rs.label}</div>
        <div class="mob-run-card">
          <div class="mob-run-hdr">
            <div class="mob-run-title">${rs.label}</div>
            <span class="mob-run-badge">Intervals.icu</span>
          </div>
          <div class="mob-run-body">
            <div class="mob-run-fmt">
              <button class="mob-copy-btn" onclick="copyText(this,${JSON.stringify(rs.fmt).replace(/"/g,'&quot;')})">📋</button>
              <pre style="white-space:pre-wrap;font-family:'DM Mono',monospace;font-size:11px;line-height:1.9;color:var(--accent)">${rs.fmt}</pre>
            </div>
            <div class="mob-run-goal">💡 ${rs.goal}</div>
            <div class="mob-run-log">
              <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px">Registro post-sesión</div>
              <div class="g2" style="gap:8px">
                <div><label>Ritmo medio logrado</label><input type="text" id="run_pace" placeholder="ej. 6:30" value="${rl.pace||''}" inputmode="text"></div>
                <div><label>Distancia (km)</label><input type="number" id="run_dist" placeholder="5.2" value="${rl.dist||''}" inputmode="decimal"></div>
                <div><label>Tiempo total (min)</label><input type="number" id="run_time" placeholder="35" value="${rl.time||''}" inputmode="numeric"></div>
                <div><label>Sensación (1-10)</label><input type="number" id="run_feel" placeholder="7" min="1" max="10" value="${rl.feel||''}" inputmode="numeric"></div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }
  }

  // ── REST ──
  if(type==='rest'){
    html+=`<div class="mob-section">
      <div class="mob-section-title">😴 Descanso activo</div>
      <div class="mob-rest-card">
        <div class="mob-rest-icon">🌿</div>
        <div class="mob-rest-title">Día de recuperación</div>
        <div class="mob-rest-text">Movilidad suave · foam roller · paseo tranquilo<br>No hay entreno programado. Deja que el cuerpo asimile la carga de la semana.</div>
      </div>
    </div>`;

  // ── NUTRITION ──

    <div class="mob-section-title">🥗 Nutrición del día</div>
    ${mealList.map(m=>{
      const done=!!(log.meals?.[m.key]);
      return `<div class="mob-meal">
        <div class="mob-meal-hdr ${done?'open':''}" onclick="toggleMeal('${m.key}',this)">
          <div>
            <div class="mob-meal-name">${m.name}</div>
            <div class="mob-meal-meta">~${m.kcal} kcal · ${m.p}g P · ${m.hc}g HC</div>
          </div>
          <div class="mob-meal-check ${done?'done':''}" id="meal_check_${m.key}">${done?'✓':''}</div>
        </div>
        <div class="mob-meal-body ${done?'open':''}" id="meal_body_${m.key}">
          ${m.items.map(it=>`<div class="mob-food-row"><span>${it.f}</span><span class="mob-food-amt">${it.a}</span></div>`).join('')}
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;border-left:2px solid var(--accent3);padding-left:8px;line-height:1.6">💡 ${m.note}</div>
          <button style="width:100%;margin-top:10px;background:${done?'rgba(200,241,53,.15)':'var(--surface2)'};color:${done?'var(--accent)':'var(--muted)'};border:1px solid ${done?'var(--accent)':'var(--border)'};padding:8px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;font-weight:500" onclick="markMeal('${m.key}')">
            ${done?'✓ Comida realizada':'Marcar como completada'}
          </button>
        </div>
      </div>`;
    }).join('')}
  </div>`;

  // ── OBSERVATIONS ──
  html+=`<div class="mob-section">
    <div class="mob-section-title">📝 Observaciones del día</div>
    <div class="mob-obs">
      <textarea class="mob-obs-ta" id="mob-obs" placeholder="Cómo te has sentido, dolor, fatiga, notas para tu coach...">${log.obs||''}</textarea>
    </div>
  </div>`;

  document.getElementById('mob-body').innerHTML=html;
  updateSaveStatus(w,d);
}

// ── MOBILE INTERACTIONS ───────────────────────────────────
function toggleSetDone(key, si){
  const btn=document.getElementById(`s_${key}_${si}_done`);
  const w=profile?.week||1;
  const log=loadDayLog(w,mobDayIdx);
  if(!log.sets) log.sets={};
  if(!log.sets[key]) log.sets[key]=[];
  if(!log.sets[key][si]) log.sets[key][si]={};
  log.sets[key][si].done=!log.sets[key][si].done;
  // save current inputs
  const kgEl=document.getElementById(`s_${key}_${si}_kg`);
  const repsEl=document.getElementById(`s_${key}_${si}_reps`);
  if(kgEl) log.sets[key][si].kg=kgEl.value;
  if(repsEl) log.sets[key][si].reps=repsEl.value;
  // save prev weight for progression
  if(kgEl&&kgEl.value) setPrevWeight(key, kgEl.value);
  saveDayLog(w,mobDayIdx,log);
  btn.classList.toggle('ok', log.sets[key][si].done);
  updateSaveStatus(w,mobDayIdx);
}

function toggleMeal(key, hdrEl){
  const body=document.getElementById('meal_body_'+key);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  hdrEl.classList.toggle('open',!isOpen);
}

function markMeal(key){
  const w=profile?.week||1;
  const log=loadDayLog(w,mobDayIdx);
  if(!log.meals) log.meals={};
  log.meals[key]=!log.meals[key];
  saveDayLog(w,mobDayIdx,log);
  // update check UI
  const check=document.getElementById('meal_check_'+key);
  if(check){
    const done=log.meals[key];
    check.classList.toggle('done',done);
    check.textContent=done?'✓':'';
  }
  // re-render the button text
  const btn=document.querySelector(`#meal_body_${key} button`);
  if(btn&&log.meals){
    const done=log.meals[key];
    btn.textContent=done?'✓ Comida realizada':'Marcar como completada';
    btn.style.background=done?'rgba(200,241,53,.15)':'var(--surface2)';
    btn.style.color=done?'var(--accent)':'var(--muted)';
    btn.style.border=`1px solid ${done?'var(--accent)':'var(--border)'}`;
  }
  updateSaveStatus(w,mobDayIdx);
}

function saveDayData(){
  const w=profile?.week||1;
  const log=loadDayLog(w,mobDayIdx);
  const type=DAYTYPES[mobDayIdx];

  // collect set data
  if(type==='strength'){
    const exList=getExercises(mobDayIdx===0?'A':'B',w);
    if(!log.sets) log.sets={};
    exList.forEach(ex=>{
      if(!log.sets[ex.key]) log.sets[ex.key]=[];
      for(let si=0;si<ex.sets;si++){
        if(!log.sets[ex.key][si]) log.sets[ex.key][si]={};
        const kgEl=document.getElementById(`s_${ex.key}_${si}_kg`);
        const repsEl=document.getElementById(`s_${ex.key}_${si}_reps`);
        const doneEl=document.getElementById(`s_${ex.key}_${si}_done`);
        if(kgEl) log.sets[ex.key][si].kg=kgEl.value;
        if(repsEl) log.sets[ex.key][si].reps=repsEl.value;
        if(kgEl&&kgEl.value) setPrevWeight(ex.key, kgEl.value);
      }
    });
  }

  // collect running data
  if(type==='running'){
    log.running={
      pace: document.getElementById('run_pace')?.value||'',
      dist: document.getElementById('run_dist')?.value||'',
      time: document.getElementById('run_time')?.value||'',
      feel: document.getElementById('run_feel')?.value||'',
    };
  }

  // collect observations
  log.obs=document.getElementById('mob-obs')?.value||'';

  saveDayLog(w,mobDayIdx,log);
  updateSaveStatus(w,mobDayIdx);

  // flash
  const btn=document.querySelector('.mob-save-btn');
  if(btn){btn.textContent='✅ Guardado';setTimeout(()=>btn.textContent='💾 Guardar día',2000);}
}

function updateSaveStatus(w,d){
  const log=loadDayLog(w,d);
  const type=DAYTYPES[d];
  const parts=[];
  if(type==='strength'&&log.sets){
    const exList=getExercises(d===0?'A':'B',w);
    const done=exList.reduce((acc,ex)=>{
      const sets=log.sets[ex.key]||[];
      return acc+sets.filter(s=>s&&s.done).length;
    },0);
    const total=exList.reduce((acc,ex)=>acc+ex.sets,0);
    if(done>0) parts.push(`${done}/${total} series`);
  }
  if(type==='running'&&log.running?.pace) parts.push(log.running.pace+'/km');
  if(log.meals){
    const mc=Object.values(log.meals).filter(Boolean).length;
    if(mc>0) parts.push(`${mc}/5 comidas`);
  }
  if(log.obs) parts.push('obs ✓');
  document.getElementById('mob-save-status').textContent=parts.length?parts.join(' · '):'sin datos';
}

// ── REPORT GENERATION ─────────────────────────────────────

4. ALERTAS O RIESGOS
   Lesión potencial · déficit extremo · sobreentrenamiento

5. AJUSTES SEMANA ${w+1}
   Cambios concretos justificados brevemente

6. SEMANA ${w+1} COMPLETA
   A. Fuerza Día A + Día B (pesos objetivo)

  document.getElementById('rep-text').value=text;

}

function copyPlan(){
  navigator.clipboard.writeText(document.getElementById('plan-body').textContent)

function copyReport(){
  const a=document.getElementById('rep-text');a.select();document.execCommand('copy');

function copyText(btn,text){

}
function flashSave(btn){btn.textContent='✅ Guardado';setTimeout(()=>btn.textContent='💾 Guardar',2000);}
