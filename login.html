<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>C.L.O.E. COACH · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0c1018;--surface:#151b28;--surface2:#1c2433;--border:#2b3448;--accent:#c8f135;--text:#ffffff;--muted:#cbd5e1;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Syne,sans-serif;font-size:18px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:380px;padding:24px}
.brand{font-size:38px;font-weight:800;margin-bottom:4px}.brand span{color:var(--accent)}
.sub{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:36px}
.card{background:rgba(21,27,40,0.15);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:1px solid rgba(43,52,72,0.4);border-radius:18px;padding:28px;box-shadow:0 12px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05)}
label{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.5px;display:block;margin-bottom:5px;margin-top:16px}
input{width:100%;background:rgba(15,22,36,0.25);color:var(--text);border:1px solid rgba(43,52,72,0.4);padding:14px 16px;border-radius:10px;font-family:'DM Mono',monospace;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#111;border:none;padding:14px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:16px;cursor:pointer;margin-top:22px;transition:opacity .2s;box-shadow:0 4px 14px rgba(200,241,53,0.25)}
.btn:hover{opacity:.85}.btn:disabled{opacity:.35;cursor:not-allowed}
.err{font-family:'DM Mono',monospace;font-size:13px;color:#f46;background:rgba(255,68,102,.08);border:1px solid rgba(255,68,102,.2);border-radius:8px;padding:10px 12px;margin-top:14px;display:none}
.err.show{display:block}
.spin{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);text-align:center;margin-top:12px;display:none}
.spin.show{display:block}
.hint{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6}
.hint button{background:none;border:none;color:var(--accent);font:inherit;cursor:pointer;padding:0}
.notice{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);background:rgba(200,241,53,.08);border:1px solid rgba(200,241,53,.25);border-radius:8px;padding:10px 12px;margin-top:12px;line-height:1.6}
.ft-toggle{background:none;border:none;color:var(--accent2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;text-decoration:underline;margin-top:18px;display:block;text-align:center;width:100%}
</style>
</head>
<body>
<video autoplay loop muted playsinline style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: -1; opacity: 0.85;">
  <source src="f_c_f_cb_b_e_df_f_mp_.mp4" type="video/mp4">
</video>
<div class="wrap">
  <div class="brand">C.L.O.E. <span>COACH</span></div>
  <div class="sub">Crush Limits Or Explode · acceso privado</div>
  <div class="card">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="btn" onclick="doLogin()">Entrar</button>
    <div class="err" id="err"></div>
    <div class="spin" id="spin">Verificando acceso...</div>
    <div class="hint" id="hint">Acceso privado para usuarios y administrador.</div>
  </div>
  <button class="ft-toggle" onclick="toggleFirstTime()">Primera vez? Accede sin contrasena</button>
  <div class="card" id="firsttime-card" style="display:none;margin-top:12px">
    <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:14px;letter-spacing:.5px">PRIMER ACCESO - ENLACE POR EMAIL</div>
    <label>Email (el mismo que te ha dado el coach)</label>
    <input type="email" id="ft-email" placeholder="tu@email.com" autocomplete="email">
    <button class="btn" id="ft-btn" onclick="doMagicLink()" style="margin-top:14px">Enviar enlace de acceso</button>
    <div class="err" id="ft-err"></div>
    <div class="spin" id="ft-spin">Enviando enlace...</div>
    <div class="notice" id="ft-ok" style="display:none">Enlace enviado a tu email. Haz clic en el enlace del email para acceder y completar tu perfil.</div>
  </div>
</div>
<script>
const SB_URL='https://wxvgxcogrlcflxldaemw.supabase.co';
const SB_KEY='sb_publishable_MxUoL5CYRj9LP4Kiuueg9A_tYkA69gq';
let sb = null;

function showErr(m) {
  const e = document.getElementById('err');
  if(e) {
    e.textContent = m;
    e.classList.add('show');
  }
}

// Inicialización inmediata sin esperar a window.onload que podría colgarse
try {
  if (typeof supabase !== 'undefined') {
    const { createClient } = supabase;
    sb = createClient(SB_URL, SB_KEY);
    
    // Comprobar sesión asíncronamente
    sb.auth.getSession().then(({data}) => {
      if(data && data.session) {
        const hint = document.getElementById('hint');
        if(hint) hint.textContent = 'Sesión detectada. Redirigiendo...';
        redirect(data.session.user.id);
      }
    }).catch(err => {
      console.error("Error comprobando sesión:", err);
    });
  } else {
    showErr("Supabase no cargó. ¿Estás en la red de la oficina?");
  }
} catch(e) {
  showErr("Error inicializando: " + e.message);
}

async function doLogin() {
  const err = document.getElementById('err');
  const spin = document.getElementById('spin');
  const btn = document.getElementById('btn');
  
  if(err) {
    err.classList.remove('show');
    err.textContent = '';
  }

  if (!sb) {
    showErr('El sistema no conectó a la base de datos. Recarga la página.');
    return;
  }

  const emailInput = document.getElementById('email');
  const passInput = document.getElementById('pass');
  const email = emailInput ? emailInput.value.trim() : '';
  const pass = passInput ? passInput.value : '';

  if(!email || !pass) { 
    showErr('Por favor, rellena email y contraseña.'); 
    return; 
  }

  if(btn) {
    btn.disabled = true;
    btn.textContent = 'Conectando...';
  }
  if(spin) spin.classList.add('show');

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    
    if (error) {
      reactivateBtn();
      showErr('Error: ' + (error.message.includes('Invalid') ? 'Credenciales incorrectas.' : error.message));
      return;
    }
    
    await redirect(data.user.id);
  } catch(e) {
    reactivateBtn();
    showErr('Fallo de red: ' + e.message);
  }
}

async function redirect(uid) {
  try {
    const { data, error } = await sb.from('profiles').select('*').eq('id', uid).maybeSingle();
    
    if(error) {
      showErr('Sesión creada, pero falló la lectura de tu perfil: ' + error.message);
      reactivateBtn();
      return;
    }
    if(!data) {
      showErr('Usuario sin perfil configurado. Pide a tu coach que genere tu acceso.');
      reactivateBtn();
      return;
    }
    
    const needsOnboarding = data.role !== 'admin' && (
      data.onboarding_completed !== true ||
      !data.age || !data.sex || !data.weight_kg || !data.height_cm || !data.goal
    );
    
    if(data.role === 'admin') window.location.replace('admin.html');
    else if(needsOnboarding) window.location.replace('onboarding.html');
    else window.location.replace('app.html');
    
  } catch(e) {
    showErr('Error crítico al redirigir: ' + e.message);
    reactivateBtn();
  }
}

function reactivateBtn() {
  const spin = document.getElementById('spin');
  const btn = document.getElementById('btn');
  if(spin) spin.classList.remove('show');
  if(btn) {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

async function forceLogout() {
  if(sb) await sb.auth.signOut();
  const hint = document.getElementById('hint');
  const err = document.getElementById('err');
  if(hint) hint.textContent = 'Sesión cerrada. Ya puedes volver a entrar.';
  if(err) err.classList.remove('show');
}

function toggleFirstTime() {
  const c = document.getElementById('firsttime-card');
  if(c) c.style.display = c.style.display === 'none' ? 'block' : 'none';
}

async function doMagicLink() {
  const ftErr = document.getElementById('ft-err');
  const spin = document.getElementById('ft-spin');
  const btn = document.getElementById('ft-btn');
  const ftOk = document.getElementById('ft-ok');
  
  if(ftErr) {
    ftErr.classList.remove('show');
    ftErr.textContent = '';
  }
  if(ftOk) ftOk.style.display = 'none';

  if(!sb) {
    if(ftErr) {
      ftErr.textContent = 'Sistema desconectado.';
      ftErr.classList.add('show');
    }
    return;
  }

  const emailInput = document.getElementById('ft-email');
  const email = emailInput ? emailInput.value.trim() : '';
  
  if(!email) {
    if(ftErr) {
      ftErr.textContent = 'Introduce tu email.';
      ftErr.classList.add('show');
    }
    return;
  }
  
  if(btn) btn.disabled = true;
  if(spin) spin.classList.add('show');
  
  try {
    const redirectTo = window.location.href.replace(/\/[^/]*$/, '/onboarding.html?firsttime=1');
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { shouldCreateUser: false, emailRedirectTo: redirectTo }
    });
    
    if(spin) spin.classList.remove('show');
    if(btn) btn.disabled = false;
    
    if(error) {
      if(ftErr) {
        ftErr.textContent = error.message;
        ftErr.classList.add('show');
      }
      return;
    }
    
    if(ftOk) ftOk.style.display = 'block';
    if(btn) btn.style.display = 'none';
  } catch(e) {
    if(spin) spin.classList.remove('show');
    if(btn) btn.disabled = false;
    if(ftErr) {
      ftErr.textContent = 'Fallo de red: ' + e.message;
      ftErr.classList.add('show');
    }
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const passInput = document.getElementById('pass');
  if(passInput) {
    passInput.addEventListener('keydown', e => { 
      if(e.key === 'Enter') doLogin(); 
    });
  }
  const ftEmailInput = document.getElementById('ft-email');
  if(ftEmailInput) {
    ftEmailInput.addEventListener('keydown', e => { 
      if(e.key === 'Enter') doMagicLink(); 
    });
  }
});
</script>
</body>
</html>
