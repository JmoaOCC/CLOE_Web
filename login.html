<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>C.L.O.E. COACH · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0c1018;--surface:#151b28;--surface2:#1c2433;--border:#2b3448;--accent:#c8f135;--text:#eef4ff;--muted:#9aa7bd;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:Syne,sans-serif;font-size:18px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:100%;max-width:380px;padding:24px}
.brand{font-size:38px;font-weight:800;margin-bottom:4px}.brand span{color:var(--accent)}
.sub{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:1px;margin-bottom:36px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px}
label{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.5px;display:block;margin-bottom:5px;margin-top:16px}
input{width:100%;background:#0f1624;color:var(--text);border:1px solid var(--border);padding:14px 16px;border-radius:10px;font-family:'DM Mono',monospace;font-size:15px;outline:none;transition:border .2s}
input:focus{border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#111;border:none;padding:14px;border-radius:10px;font-weight:800;font-family:Syne,sans-serif;font-size:16px;cursor:pointer;margin-top:22px;transition:opacity .2s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.35;cursor:not-allowed}
.err{font-family:'DM Mono',monospace;font-size:13px;color:#f46;background:rgba(255,68,102,.08);border:1px solid rgba(255,68,102,.2);border-radius:8px;padding:10px 12px;margin-top:14px;display:none}
.err.show{display:block}
.spin{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);text-align:center;margin-top:12px;display:none}
.spin.show{display:block}
.hint{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6}
.hint button{background:none;border:none;color:var(--accent);font:inherit;cursor:pointer;padding:0}
.notice{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);background:rgba(200,241,53,.08);border:1px solid rgba(200,241,53,.25);border-radius:8px;padding:10px 12px;margin-top:12px;line-height:1.6}
.ft-toggle{background:none;border:none;color:var(--accent2);font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;text-decoration:underline;margin-top:18px;display:block;text-align:center;width:100%}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">C.L.O.E. <span>COACH</span></div>
  <div class="sub">Crush Limits Or Explode · acceso privado</div>
  <div class="card">
    <label>Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    <label>Contraseña</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="btn" onclick="login()">Entrar</button>
    <div class="err" id="err"></div>
    <div class="spin" id="spin">Verificando acceso...</div>
    <div class="hint" id="hint">Acceso privado para usuarios y administrador.</div>
  </div>
  <button class="ft-toggle" onclick="toggleFirstTime()">Primera vez? Accede sin contrasena</button>
  <div class="card" id="firsttime-card" style="display:none;margin-top:12px">
    <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);margin-bottom:14px;letter-spacing:.5px">PRIMER ACCESO - ENLACE POR EMAIL</div>
    <label>Email (el mismo que te ha dado el coach)</label>
    <input type="email" id="ft-email" placeholder="tu@email.com" autocomplete="email">
    <button class="btn" id="ft-btn" onclick="sendMagicLink()" style="margin-top:14px">Enviar enlace de acceso</button>
    <div class="err" id="ft-err"></div>
    <div class="spin" id="ft-spin">Enviando enlace...</div>
    <div class="notice" id="ft-ok" style="display:none">Enlace enviado a tu email. Haz clic en el enlace del email para acceder y completar tu perfil.</div>
  </div>
</div>
<script>
const SB_URL='https://wxvgxcogrlcflxldaemw.supabase.co';
const SB_KEY='sb_publishable_MxUoL5CYRj9LP4Kiuueg9A_tYkA69gq';
let sb = null;

window.onload = function() {
  const err = document.getElementById('err');
  if (typeof supabase === 'undefined') {
    err.textContent = 'Error de conexión: Tu red (antivirus o firewall corporativo) está bloqueando la conexión. Intenta desde otra red o usa tu móvil.';
    err.classList.add('show');
    return;
  }
  try {
    const {createClient} = supabase;
    sb = createClient(SB_URL, SB_KEY);
    init();
    const passInput = document.getElementById('pass');
    if(passInput) {
      passInput.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
    }
  } catch(e) {
    err.textContent = 'Error al iniciar la base de datos: ' + e.message;
    err.classList.add('show');
  }
};

async function init(){
  if(!sb) return;
  try {
    const {data:{session}} = await sb.auth.getSession();
    if(!session) return;
    document.getElementById('hint').textContent = 'Sesión detectada. Redirigiendo...';
    await redirect(session.user.id);
  } catch (e) {
    console.error("Error de sesión local:", e);
    document.getElementById('hint').innerHTML = 'Error al validar tu sesión previa. <button type="button" onclick="forceLogout()">Haz clic aquí para limpiar caché</button>';
  }
}

async function login(){
  const err = document.getElementById('err');
  if (!sb) {
    err.textContent = 'El sistema no pudo conectar con la base de datos. Comprueba tu red.';
    err.classList.add('show');
    return;
  }

  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('pass').value;
  const btn=document.getElementById('btn');
  const spin=document.getElementById('spin');
  err.classList.remove('show');
  
  if(!email||!pass){ showErr('Rellena email y contraseña.'); return; }
  
  btn.disabled=true; 
  spin.classList.add('show');
  
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password: pass});
    if(error){
      spin.classList.remove('show'); 
      btn.disabled=false;
      showErr('Error al acceder: ' + error.message);
      return;
    }
    await redirect(data.user.id);
  } catch(e) {
    spin.classList.remove('show'); 
    btn.disabled=false;
    showErr('Fallo de red al intentar acceder: ' + e.message);
  }
}

async function redirect(uid){
  try {
    const {data,error} = await sb.from('profiles').select('*').eq('id',uid).maybeSingle();
    if(error){showErr('La sesión está creada, pero falló la lectura de tu perfil: '+error.message); return;}
    if(!data){showErr('Usuario sin perfil configurado. Pide a tu coach que genere tu acceso.'); return;}
    
    const needsOnboarding = data.role !== 'admin' && (
      data.onboarding_completed !== true ||
      !data.age || !data.sex || !data.weight_kg || !data.height_cm || !data.goal
    );
    
    if(data.role === 'admin') window.location.href = 'admin.html';
    else if(needsOnboarding) window.location.href = 'onboarding.html';
    else window.location.href = 'app.html';
  } catch(e) {
    showErr('Error crítico al redirigir: ' + e.message);
    document.getElementById('spin').classList.remove('show');
    document.getElementById('btn').disabled=false;
  }
}

function showErr(m){const e=document.getElementById('err');e.textContent=m;e.classList.add('show');}
async function forceLogout(){
  if(sb) await sb.auth.signOut();
  document.getElementById('hint').textContent='Sesión local cerrada. Ya puedes volver a entrar.';
  document.getElementById('err').classList.remove('show');
}

function toggleFirstTime(){
  const c=document.getElementById('firsttime-card');
  c.style.display=c.style.display==='none'?'block':'none';
}

async function sendMagicLink(){
  if(!sb) return;
  const email=document.getElementById('ft-email').value.trim();
  const btn=document.getElementById('ft-btn');
  const ftErr=document.getElementById('ft-err');
  const spin=document.getElementById('ft-spin');
  ftErr.classList.remove('show');
  document.getElementById('ft-ok').style.display='none';
  if(!email){ftErr.textContent='Introduce tu email.';ftErr.classList.add('show');return;}
  btn.disabled=true;spin.classList.add('show');
  
  try {
    const redirectTo=window.location.href.replace(/\/[^/]*$/','/onboarding.html?firsttime=1');
    const {error}=await sb.auth.signInWithOtp({
      email,
      options:{shouldCreateUser:false,emailRedirectTo:redirectTo}
    });
    spin.classList.remove('show');btn.disabled=false;
    if(error){ftErr.textContent=error.message;ftErr.classList.add('show');return;}
    document.getElementById('ft-ok').style.display='block';
    btn.style.display='none';
  } catch(e) {
    spin.classList.remove('show');btn.disabled=false;
    ftErr.textContent='Fallo de red: ' + e.message;
    ftErr.classList.add('show');
  }
}
</script>
</body>
</html>
